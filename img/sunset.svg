<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="50%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#f39c12"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#922b21"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="200" fill="url(#sky)"/>
  <!-- Sea -->
  <rect y="200" width="400" height="80" fill="url(#sea)"/>
  <!-- Sun -->
  <circle cx="200" cy="195" r="48" fill="#f9ca24" opacity="0.95"/>
  <!-- Sun glow -->
  <circle cx="200" cy="195" r="64" fill="#f9ca24" opacity="0.15"/>
  <!-- Horizon reflection -->
  <rect x="160" y="200" width="80" height="80" fill="#f9ca24" opacity="0.25"/>
  <!-- Waves -->
  <path d="M0 220 Q50 215 100 220 Q150 225 200 220 Q250 215 300 220 Q350 225 400 220" stroke="#f39c12" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M0 235 Q50 230 100 235 Q150 240 200 235 Q250 230 300 235 Q350 240 400 235" stroke="#e67e22" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Label -->
  <text x="200" y="260" font-family="Georgia, serif" font-size="16" fill="#fdebd0" text-anchor="middle" font-style="italic">Sunset over the ocean</text>
</svg>
