<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b2a4a"/>
      <stop offset="50%" stop-color="#4a6fa5"/>
      <stop offset="100%" stop-color="#8fb8d9"/>
    </linearGradient>
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#cbd5e0"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="280" fill="url(#sky)"/>
  <!-- Back mountain -->
  <polygon points="300,210 380,70 460,210" fill="#2c3e6b" opacity="0.6"/>
  <!-- Main mountain -->
  <polygon points="60,230 200,40 340,230" fill="#34495e"/>
  <!-- Snow cap main -->
  <polygon points="200,40 160,115 200,108 240,115" fill="url(#snow)"/>
  <!-- Side mountain left -->
  <polygon points="-20,230 90,95 200,230" fill="#2c3e6b" opacity="0.7"/>
  <!-- Snow cap left -->
  <polygon points="90,95 70,145 90,138 110,145" fill="url(#snow)" opacity="0.85"/>
  <!-- Stars -->
  <circle cx="50" cy="30" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="130" cy="18" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="260" cy="25" r="1.8" fill="white" opacity="0.9"/>
  <circle cx="350" cy="15" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="380" cy="40" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="20" cy="55" r="1" fill="white" opacity="0.7"/>
  <circle cx="310" cy="50" r="1.3" fill="white" opacity="0.8"/>
  <!-- Ground snow -->
  <ellipse cx="200" cy="232" rx="200" ry="12" fill="#e8ecf0" opacity="0.3"/>
  <!-- Label -->
  <text x="200" y="264" font-family="Georgia, serif" font-size="16" fill="#d6e4f7" text-anchor="middle" font-style="italic">Snow-capped peaks at night</text>
</svg>
