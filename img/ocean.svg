  </defs>
  <!-- Sky -->
  <rect width="400" height="155" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="100" cy="60" rx="55" ry="22" fill="white" opacity="0.85"/>
  <ellipse cx="145" cy="52" rx="38" ry="18" fill="white" opacity="0.85"/>
  <ellipse cx="65" cy="55" rx="32" ry="16" fill="white" opacity="0.85"/>
