  <path d="M0 170 Q40 163 80 170 Q120 177 160 170 Q200 163 240 170 Q280 177 320 170 Q360 163 400 170" stroke="white" stroke-width="2" fill="none" opacity="0.45"/>
  <path d="M0 190 Q40 183 80 190 Q120 197 160 190 Q200 183 240 190 Q280 197 320 190 Q360 183 400 190" stroke="white" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M0 212 Q50 205 100 212 Q150 219 200 212 Q250 205 300 212 Q350 219 400 212" stroke="white" stroke-width="1.5" fill="none" opacity="0.25"/>
