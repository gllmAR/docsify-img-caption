    <script>
        window.$docsify = {
            name: 'Docsify img caption',
            repo: 'https://github.com/gllmAR/docsify-img-caption',
    
            auto2top: true,

            subMaxLevel: 4,       // Adjust the level to include in TOC
            copyCode: {

            },
